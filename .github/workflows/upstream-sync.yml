name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 4 * * *'  # Daily at 4 AM UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "gitons[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/abhigyanpatwari/GitNexus.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check for new upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" -eq 0 ]; then
            echo "Already up to date with upstream"
          else
            echo "$BEHIND new commits from upstream"
          fi

      - name: Rebase on upstream
        if: steps.check.outputs.behind != '0'
        run: |
          git rebase upstream/main
          git push origin main --force-with-lease

      - name: Trigger Docker build
        if: steps.check.outputs.behind != '0'
        run: gh workflow run docker-publish.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
